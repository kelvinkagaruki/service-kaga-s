<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Kaga's Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0066cc 0%, #004a99 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #0066cc;
            border-bottom-color: #0066cc;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #0066cc;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0052a3;
        }

        .account-type {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .account-type label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            cursor: pointer;
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🏪 Kaga's Market</h1>
            <p>Login or Register</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-button active" onclick="showLogin()">LOGIN</button>
                <button class="tab-button" onclick="showRegister()">REGISTER</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm" class="tab-content active">
                <form onsubmit="loginUser(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn">Login</button>
                </form>

                <div class="link">
                    Don't have account? <a onclick="showRegister()">Register here</a>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="tab-content">
                <form onsubmit="registerUser(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label>Account Type</label>
                        <div class="account-type">
                            <label>
                                <input type="radio" name="accountType" value="buyer" checked>
                                Buyer
                            </label>
                            <label>
                                <input type="radio" name="accountType" value="seller">
                                Seller
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="Enter your phone" required>
                    </div>

                    <div class="form-group">
                        <label>Password (min 6 characters)</label>
                        <input type="password" id="regPassword" placeholder="Create a password" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required minlength="6">
                    </div>

                    <button type="submit" class="btn">Create Account</button>
                </form>

                <div class="link">
                    Have an account? <a onclick="showLogin()">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.querySelectorAll('.tab-button')[0].classList.add('active');
            document.querySelectorAll('.tab-button')[1].classList.remove('active');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
            document.querySelectorAll('.tab-button')[0].classList.remove('active');
            document.querySelectorAll('.tab-button')[1].classList.add('active');
        }

        function loginUser(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Get users from storage
            const users = JSON.parse(localStorage.getItem('kagaUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                alert('❌ Email or password is wrong');
                return;
            }

            // Save logged in user
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert('✅ Login successful!');
            window.location.href = 'index.html';
        }

        function registerUser(event) {
            event.preventDefault();

            const name = document.getElementById('regName').value;
            const type = document.querySelector('input[name="accountType"]:checked').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            // Check passwords match
            if (password !== confirmPassword) {
                alert('❌ Passwords do not match');
                return;
            }

            // Check if email already exists
            const users = JSON.parse(localStorage.getItem('kagaUsers') || '[]');
            if (users.find(u => u.email === email)) {
                alert('❌ Email already registered');
                return;
            }

            // Create new user
            const newUser = {
                id: Date.now(),
                name: name,
                type: type,
                email: email,
                phone: phone,
                password: password,
                registeredDate: new Date().toLocaleDateString()
            };

            users.push(newUser);
            localStorage.setItem('kagaUsers', JSON.stringify(users));

            alert('✅ Account created! Now login with your email and password');
            showLogin();
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
        }
    </script>
</body>
</html>
